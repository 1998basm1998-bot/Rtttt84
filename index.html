<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة رفع وبث الفيديوهات التلقائية - أبو أمير</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }
        h2 {
            color: #ff6000;
            margin-top: 0;
            border-bottom: 2px solid #ff6000;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: #ff6000;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background-color: #e05500;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        /* تصميم شريط التقدم */
        .progress-container {
            margin-top: 20px;
            background-color: #e9ecef;
            border-radius: 8px;
            display: none;
            overflow: hidden;
            position: relative;
            height: 25px;
        }
        .progress-bar {
            background-color: #ff6000;
            height: 100%;
            width: 0%;
            transition: width 0.1s ease;
        }
        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 2px;
            font-weight: bold;
            color: #333;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
        }
        .success { background-color: #d4edda; color: #155724; display: block; }
        .error { background-color: #f8d7da; color: #721c24; display: block; }
        .info { background-color: #cce5ff; color: #004085; display: block; }
        
        /* مشغل الفيديو */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>لوحة رفع الفيديو الحقيقية (الآدمن)</h2>
        
        <div class="form-group">
            <label>عنوان المحاضرة / الدرس:</label>
            <input type="text" id="videoTitle" placeholder="مثال: الدرس الأول - واجهات التطبيق">
        </div>
        
        <div class="form-group">
            <label>اختر الفيديو من جهازك:</label>
            <input type="file" id="videoFile" accept="video/*">
        </div>
        
        <button id="uploadBtn" onclick="startUpload()">ابدأ الرفع والمعالجة تلقائياً</button>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
        
        <div id="uploadStatus" class="status"></div>
    </div>

    <div class="container" id="playerContainer" style="display: none;">
        <h2>مشغل الفيديو التلقائي (شاشة الطالب)</h2>
        <div id="playerArea"></div>
    </div>

    <script>
        // المعطيات البرمجية الخاصة بك
        const LIBRARY_ID = '669186'; 
        const STREAM_API_KEY = 'e8d7c456-c12f-412f-4315-83189d92aef9-dd5c-4669'; 

        async function startUpload() {
            const title = document.getElementById('videoTitle').value;
            const fileInput = document.getElementById('videoFile');
            const statusDiv = document.getElementById('uploadStatus');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const uploadBtn = document.getElementById('uploadBtn');
            const playerContainer = document.getElementById('playerContainer');
            
            if (!title || fileInput.files.length === 0) {
                statusDiv.className = "status error";
                statusDiv.innerText = "الرجاء إدخال عنوان واختيار ملف فيديو.";
                return;
            }
            
            const file = fileInput.files[0];
            
            // تهيئة الواجهة وبدء الرفع
            uploadBtn.disabled = true;
            statusDiv.className = "status info";
            statusDiv.innerText = "جاري إنشاء سجل الفيديو في سيرفرات Bunny...";
            playerContainer.style.display = "none";
            
            try {
                // 1. طلب إنشاء كائن الفيديو برمجياً لجلب الـ GUID
                const createResponse = await fetch(`https://video.bunnycdn.com/library/${LIBRARY_ID}/videos`, {
                    method: 'POST',
                    headers: {
                        'AccessKey': STREAM_API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title: title })
                });
                
                const createData = await createResponse.json();
                const videoId = createData.guid;
                
                statusDiv.innerText = "تم حجز السيرفر بنجاح، يبدأ الرفع الفعلي الآن...";
                progressContainer.style.display = "block";
                
                // 2. رفع الملف الفعلي باستخدام XMLHttpRequest لمتابعة شريط التقدم بدقة
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', `https://video.bunnycdn.com/library/${LIBRARY_ID}/videos/${videoId}`);
                xhr.setRequestHeader('AccessKey', STREAM_API_KEY);
                
                // تتبع نسبة الرفع حزمة بحزمة
                xhr.upload.onprogress = function(e) {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        progressBar.style.width = percentComplete + '%';
                        progressText.innerText = percentComplete + '%';
                    }
                };
                
                // عند اكتمال الرفع بنجاح
                xhr.onload = function() {
                    uploadBtn.disabled = false;
                    if (xhr.status === 200 || xhr.status === 201) {
                        statusDiv.className = "status success";
                        statusDiv.innerHTML = `تم الرفع 100% وحفظ الملف بنجاح! يتم الآن ربط وتشغيل الفيديو بالأسفل تلقائياً...`;
                        
                        // الربط الحقيقي والتلقائي: تفعيل المشغل فوراً بالـ Video ID المستلم
                        autoPlayVideo(videoId);
                    } else {
                        statusDiv.className = "status error";
                        statusDiv.innerText = "فشل الرفع، يرجى التحقق من اتصال الإنترنت.";
                    }
                };
                
                xhr.onerror = function() {
                    uploadBtn.disabled = false;
                    statusDiv.className = "status error";
                    statusDiv.innerText = "حدث خطأ في الاتصال بالشبكة.";
                };
                
                xhr.send(file);
                
            } catch (error) {
                uploadBtn.disabled = false;
                statusDiv.className = "status error";
                statusDiv.innerText = "حدث خطأ غير متوقع: " + error.message;
            }
        }

        // دالة تشغيل الفيديو الفورية بدون تدخل يدوي
        function autoPlayVideo(videoId) {
            const playerContainer = document.getElementById('playerContainer');
            const playerArea = document.getElementById('playerArea');
            
            playerContainer.style.display = "block";
            playerArea.innerHTML = `
                <div class="video-container">
                    <iframe src="https://iframe.mediadelivery.net/embed/${LIBRARY_ID}/${videoId}?autoplay=true&loop=false&muted=false&preload=true&responsive=true" 
                            loading="lazy" 
                            allow="accelerometer; gyroscope; autocomplete; encrypted-media; picture-in-picture;" 
                            allowfullscreen="true">
                    </iframe>
                </div>
            `;
            
            // عمل Scroll تلقائي لأسفل الشاشة ليظهر الفيديو أمام المستخدم فورا
            playerContainer.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
